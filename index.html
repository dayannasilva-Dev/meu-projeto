<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#131312',
                            800: '#1a1a18',
                            700: '#2c2c2a',
                            600: '#444441',
                            500: '#5f5e5a',
                            400: '#888780',
                            300: '#b4b2a9',
                            200: '#d3d1c7',
                            100: '#f1efe8',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-dark-900 text-dark-100 font-sans min-h-screen">

    <!-- Header -->
    <header class="bg-dark-800 border-b border-dark-700 py-12 text-center">
        <h1 class="text-2xl font-medium text-dark-100 tracking-wide mb-2">Hello, I'm Dayana 👩‍💻</h1>
        <p class="text-dark-400 text-sm">Developer in Evolution🚀</p>
    </header>

    <!-- Nav -->
    <nav class="bg-dark-800 border-b border-dark-700">
        <ul class="flex justify-center gap-8 py-3">
            <li><a href="#sobre" class="text-dark-400 text-sm hover:text-dark-100 transition-colors">Sobre mim</a></li>
            <li><a href="#habilidades" class="text-dark-400 text-sm hover:text-dark-100 transition-colors">Habilidades</a></li>
            <li><a href="#contato" class="text-dark-400 text-sm hover:text-dark-100 transition-colors">Contato</a></li>
        </ul>
    </nav>

    <!-- Conteúdo -->
    <main class="max-w-2xl mx-auto px-6 py-10 flex flex-col gap-6">

        <!-- Sobre mim -->
        <section id="sobre" class="bg-dark-800 border border-dark-700 rounded-xl p-7 hover:-translate-y-1 hover:border-dark-600 transition-all duration-200">
            <h2 class="text-xs font-medium text-dark-500 uppercase tracking-widest mb-4">Sobre mim</h2>
            <p class="text-dark-300 text-sm leading-relaxed">
                Tenho experiência com suporte técnico e estou aprendendo desenvolvimento web.
            </p>
        </section>

        <!-- Habilidades -->
        <section id="habilidades" class="bg-dark-800 border border-dark-700 rounded-xl p-7 hover:-translate-y-1 hover:border-dark-600 transition-all duration-200">
            <h2 class="text-xs font-medium text-dark-500 uppercase tracking-widest mb-4">Habilidades</h2>
            <div class="flex flex-wrap gap-2">
                <span class="bg-dark-700 text-dark-300 text-xs px-3 py-1 rounded-full border border-dark-600">Java</span>
                <span class="bg-dark-700 text-dark-300 text-xs px-3 py-1 rounded-full border border-dark-600">JavaScript</span>
                <span class="bg-dark-700 text-dark-300 text-xs px-3 py-1 rounded-full border border-dark-600">CSS</span>
                <span class="bg-dark-700 text-dark-300 text-xs px-3 py-1 rounded-full border border-dark-600">HTML</span>
                <span class="bg-dark-700 text-dark-300 text-xs px-3 py-1 rounded-full border border-dark-600">Git/GitHub</span>
            </div>
        </section>

        <!-- Contato -->
        <section id="contato" class="bg-dark-800 border border-dark-700 rounded-xl p-7 hover:-translate-y-1 hover:border-dark-600 transition-all duration-200">
            <h2 class="text-xs font-medium text-dark-500 uppercase tracking-widest mb-4">Contato</h2>

            <form id="form-contato" class="flex flex-col gap-3">
                <label for="nome" class="text-dark-400 text-sm">Nome</label>
                <input
                    type="text" id="nome" name="nome" required
                    placeholder="Seu nome"
                    class="bg-dark-900 border border-dark-700 rounded-lg px-4 py-2 text-sm text-dark-100 placeholder-dark-500 focus:outline-none focus:border-dark-400 transition-colors"
                >

                <label for="email" class="text-dark-400 text-sm">Email</label>
                <input
                    type="email" id="email" name="email" required
                    placeholder="seu@email.com"
                    class="bg-dark-900 border border-dark-700 rounded-lg px-4 py-2 text-sm text-dark-100 placeholder-dark-500 focus:outline-none focus:border-dark-400 transition-colors"
                >

                <label for="mensagem" class="text-dark-400 text-sm">Mensagem</label>
                <textarea
                    id="mensagem" name="mensagem" rows="5" required
                    placeholder="Sua mensagem..."
                    class="bg-dark-900 border border-dark-700 rounded-lg px-4 py-2 text-sm text-dark-100 placeholder-dark-500 focus:outline-none focus:border-dark-400 transition-colors resize-y"
                ></textarea>

                <button
                    type="submit"
                    class="self-start mt-1 bg-dark-100 text-dark-900 text-sm font-medium px-6 py-2 rounded-lg hover:bg-dark-200 active:scale-95 transition-all duration-150"
                >
                    Enviar
                </button>

                <div id="sucesso" class="alerta hidden mt-2 p-3 rounded-lg text-sm font-medium"></div>
            </form>
        </section>

    </main>

    <!-- Footer -->
    <footer class="text-center py-6 text-xs text-dark-500 border-t border-dark-700">
        <p>© 2024 Dayana. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
